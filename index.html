<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitLog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header"><h1>FitLog</h1></header>
  <main>
    <section id="tab-workout" class="tab-panel active">
      <h2>기록</h2>
      <p>곧 구현됩니다</p>
      <!-- 임시 테스트 훅: Task 4에서 실제 UI로 교체하며 제거 -->
      <button id="test-picker-btn" class="btn btn-primary">종목 선택 테스트</button>
    </section>
    <section id="tab-body" class="tab-panel">
      <h2>체중</h2>
      <p>곧 구현됩니다</p>
    </section>
    <section id="tab-stats" class="tab-panel">
      <h2>통계</h2>
      <p>곧 구현됩니다</p>
    </section>
    <section id="tab-routines" class="tab-panel">
      <h2>루틴</h2>
      <p>곧 구현됩니다</p>
    </section>
  </main>
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="workout">기록</button>
    <button class="tab-btn" data-tab="body">체중</button>
    <button class="tab-btn" data-tab="stats">통계</button>
    <button class="tab-btn" data-tab="routines">루틴</button>
  </nav>
  <div id="toast" class="toast" hidden></div>
  <div id="modal-root" hidden></div>
  <script src="js/ui.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
